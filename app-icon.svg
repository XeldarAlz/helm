<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58D5E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7CE3EC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentDim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58D5E0;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7CE3EC;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#58D5E0" stroke-width="1" opacity="0.15" />

  <!-- Ship's wheel group -->
  <g filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="256" cy="256" r="120" fill="none" stroke="url(#accent)" stroke-width="14"/>

    <!-- Inner ring -->
    <circle cx="256" cy="256" r="64" fill="none" stroke="url(#accent)" stroke-width="8"/>

    <!-- Spokes connecting inner to outer ring -->
    <line x1="256" y1="192" x2="256" y2="136" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <line x1="256" y1="320" x2="256" y2="376" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <line x1="192" y1="256" x2="136" y2="256" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <line x1="320" y1="256" x2="376" y2="256" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>

    <!-- Diagonal spokes -->
    <line x1="211" y1="211" x2="171" y2="171" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <line x1="301" y1="301" x2="341" y2="341" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <line x1="211" y1="301" x2="171" y2="341" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <line x1="301" y1="211" x2="341" y2="171" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>

    <!-- Spoke handles (pegs extending beyond outer ring) -->
    <line x1="256" y1="136" x2="256" y2="104" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <line x1="256" y1="376" x2="256" y2="408" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <line x1="136" y1="256" x2="104" y2="256" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <line x1="376" y1="256" x2="408" y2="256" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <line x1="171" y1="171" x2="148" y2="148" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <line x1="341" y1="341" x2="364" y2="364" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <line x1="171" y1="341" x2="148" y2="364" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <line x1="341" y1="171" x2="364" y2="148" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="20" fill="url(#accent)" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="8" fill="#0A0E14"/>
</svg>
