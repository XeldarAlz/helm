name: Bug Report
description: Report a bug or unexpected behavior in Helm
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Open file '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen instead.
      placeholder: What should have happened?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your OS and version.
      placeholder: e.g., macOS 15.3, Ubuntu 24.04, Windows 11
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node Version
      description: Output of `node --version`.
      placeholder: e.g., v20.11.0
    validations:
      required: false

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code Version
      description: Output of `claude --version`.
      placeholder: e.g., 1.0.0
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Helm is affected?
      options:
        - Pipeline (.claude/)
        - Helm GUI
        - Hooks
        - Skills
        - Other
    validations:
      required: false

  - type: textarea
    id: logs-screenshots
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs, error messages, or screenshots.
      render: shell
    validations:
      required: false
