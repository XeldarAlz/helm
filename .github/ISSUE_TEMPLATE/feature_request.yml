name: Feature Request
description: Suggest a new feature or improvement for Helm
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature you'd like.
      placeholder: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Motivation
      description: Why do you need this feature? What problem does it solve?
      placeholder: Describe the use case or workflow this would improve.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have an idea for how this could be implemented, describe it here.
      placeholder: How could this work?
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Helm does this relate to?
      options:
        - Pipeline
        - GUI
        - Skills
        - Agents
        - Hooks
        - Commands
        - Other
    validations:
      required: false
